<!DOCTYPE html>
<html>

<head>
    <title>

        TABLES IN HTML
    </title>

<body>
    <h1>TABLE</h1>
    <table border="1">
        <tr>


            <th>PERSON</th>
            <th>AGE</th>


        </tr>
        <tr>
            <td>krishna</td>
            <td>20</td>

        </tr>
        <tr>
            <td>NEEL</td>
            <td>21</td>

        </tr>

    </table>


    <h1>NESTED TABLE</h1>
    <table border="3">
        <tr>
            <th>col 1</th>
            <th>col 2</th>
            <th>col 3</th>
        </tr>
        <tr>
            <td rowspan="2">row 1 cell 1</td>
            <td>row 2 cell 1</td>
            <td> row 3 cell 1 </td>
        </tr>
        <tr>
            <td>row 2 cell 2</td>
            <td> row 3 cell 2</td>

        </tr>
        <tr>
            <td colspan="3">row 1 cell 3</td>
            

        </tr>
    </table>

</body>
</head>

</html>
