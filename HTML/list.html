<!DOCTYPE html>
<html>
    <head>
        <title>LIST IN HTML</title>
    </head>
    <body>
        <h1>ORDERED LIST</h1>
        <h3>LIST OF ANIMALS</h3>
        <ol type="I">
            <li>DOG</li>
            <li>CAT</li>
            <li>RABBIT</li>
            <li>COW</li>
        </ol>
        <h1>UNORDERED LIST</h1>
        <h3>LIST OF ANIMALS</h3>
        <ul type="square">
            <li>DOG</li>
            <li>CAT</li>
            <li>RABBIT</li>
            <li>COW</li>

        </ul>
         <h1>NESTED LISTS</h1>

         <ul>
         <li>FRUITS
        
         <ul>
        <li>apple</li>
        <li>banana</li>
        <li>orange</li>   
    </ul>
    </li>
    </ul>
     <ul>
        <li>BERRIES
            <ul>
                <li> Strawberry</li>
                 <li>Blueberry</li>
            </ul>
        </li>
     </ul>


    </body>
</html>
